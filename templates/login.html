<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso - Conta em Dia</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-container { max-width: 300px; margin: 100px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input[type="password"] { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .erro { color: #e74c3c; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body style="background: #f0f2f5;">
    <div class="login-container">
        <h2>🔒 Conta em Dia</h2>
        <p>Acesso Restrito</p>

        {% if erro %}
            <p class="erro">{{ erro }}</p>
        {% endif %}

        <form action="/login" method="POST">
            <input type="password" name="senha" placeholder="Digite a senha" required autofocus>
            <button type="submit" style="width:100%">Entrar</button>
        </form>
    </div>
</body>
</html>
